<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Painel de Obras Públicas - Governo de Minas Gerais</title>

    <!-- ============================================================
         BIBLIOTECAS EXTERNAS
    ============================================================ -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <!-- Chart.js | PapaParse | jQuery | FileSaver | JSZip -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>

        /* ============================================================
           1. VARIÁVEIS DE CORES
        ============================================================ */
        :root {
            --primary-dark:      #1a3a5c;
            --primary-darker:    #0f2a44;
            --accent-red:        #b93c42;
            --accent-bright:     #db233f;
            --background-light:  #f5f7fa;
            --success-green:     #28a745;
            --warning-yellow:    #ffc107;
            --info-blue:         #17a2b8;
        }

        /* ============================================================
           2. RESET E CONFIGURAÇÕES GLOBAIS
        ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; height: auto; min-height: auto; }
        body {
            font-family: 'Montserrat', Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-light);
            padding-bottom: 15px;
            overflow-x: hidden;
            min-height: auto;
            height: auto;
            position: relative;
        }
        body, button, input, select, textarea, span, div { font-family: 'Montserrat', sans-serif !important; }
        .material-icons { font-family: 'Material Icons' !important; font-size: 14px; vertical-align: middle; }

        /* ============================================================
           3. LAYOUT PRINCIPAL
        ============================================================ */
        .main-container { height: auto; min-height: auto; overflow: visible; position: relative; }
        .container-fluid { width: 100%; max-width: 88% !important; padding: 0 40px; margin: 0; height: auto; min-height: auto; }
        .dashboard-container { width: 100%; max-width: 100%; padding: 0 40px; margin: 0 auto; height: auto; min-height: auto; }
        .tab-content, .tab-pane { width: 100%; height: auto; min-height: auto; overflow: visible; }
        .table-container { height: auto; min-height: auto; overflow: visible; position: relative; }
        .iframe-mode { overflow: visible !important; }

        /* ============================================================
           4. DATA DE ATUALIZAÇÃO
        ============================================================ */
        .data-atualizacao-container { display: flex; justify-content: left; align-items: center; margin: 15px 0; }
        .data-atualizacao-box {
            background: transparent !important;
            border-radius: 8px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--primary-dark);
            font-weight: 600;
            box-shadow: none;
        }
        .data-atualizacao-box i, .data-atualizacao-box .material-icons { font-size: 14px; color: var(--accent-red); }

        /* ============================================================
           5. FILTROS
        ============================================================ */
        .filter-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 20px;
            border-left: none;
            width: 100%;
        }
        .filter-label { font-size: 13px; font-weight: 600; color: #1a3a5c; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control, .form-select {
            border: 2px solid #e9ecef;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            transition: all 0.3s ease;
            height: auto;
            width: 100%;
        }
        .form-control:focus, .form-select:focus { border-color: var(--accent-red); box-shadow: 0 0 0 2px rgba(185,60,66,0.15); }
        .modern-select {
            border: 1.5px solid #dfe5ec !important;
            border-radius: 8px !important;
            padding: 10px 12px !important;
            font-size: 14px !important;
            height: 48px !important;
            line-height: 1.5 !important;
            background-color: #fff;
            transition: all 0.2s ease;
            width: 100%;
        }
        .modern-select:focus { border-color: #1a3a5c !important; box-shadow: 0 0 0 2px rgba(26,58,92,0.1); }
        .filters-row { display: flex; gap: 15px; width: 100%; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 140px; }
        .filter-buttons-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .consulta-filters-row { display: flex; flex-wrap: wrap; gap: 15px; width: 100%; }
        .consulta-filter-group { flex: 1 1 calc(33.333% - 15px); min-width: 200px; }
        .consulta-buttons-row { display: flex; gap: 10px; width: 100%; margin-top: 15px; justify-content: flex-start; flex-wrap: wrap; }
        .botoes-abaixo { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }

        /* ============================================================
           6. CARDS DE MÉTRICAS
        ============================================================ */
        .metric-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e9ef;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            height: 100%;
            transition: box-shadow 0.25s ease, transform 0.25s ease;
        }
        .metric-card:hover { box-shadow: 0 8px 24px rgba(26,58,92,0.13); transform: translateY(-2px); }
        .metric-header {
            background: #20445d;
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .metric-body { padding: 12px 15px; }
        .metric-value { font-size: 20px; font-weight: 700; color: #171c21; }
        .metric-sublabel { font-size: 10px; color: #94a3b8; font-weight: 500; margin-top: 2px; }

        /* ============================================================
           7. GRÁFICOS
        ============================================================ */
        .chart-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            min-height: 320px;
            padding: 0;
            overflow: hidden;
        }
        .chart-container canvas { max-width: 100%; }
        .chart-header { background: #20445d; color: white; padding: 12px 16px; margin: 0; }
        .chart-title { font-size: 14px; font-weight: 600; color: white; margin: 0; }
        .chart-wrapper { height: 260px; display: flex; align-items: center; justify-content: center; padding: 10px 15px; width: 100%; }
        .chart-wrapper canvas { max-height: 240px; }

        /* ============================================================
           8. TABELAS
        ============================================================ */
        .table-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .table-title { font-size: 13px; font-weight: 600; margin: 0; }
        .table-badge { background: #1a3a5c; color: white; padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
        .table-fixed-header-container { position: relative; overflow: auto; width: 100%; max-height: 600px; }
        .table-fixed-header-container table thead th {
            background-color: #54697b !important;
            color: white !important;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
            padding: 12px 10px;
            font-size: 12px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .table { width: 100%; font-size: 13px; border-collapse: collapse; table-layout: auto; }
        .table th, .table td { border: 1px solid #d6dee6; }
        .table thead th {
            background-color: #54697b !important;
            color: white !important;
            font-weight: 600;
            font-size: 12px;
            padding: 12px 10px;
            text-transform: uppercase;
            border: 1px solid #d6dee6;
            cursor: pointer;
            user-select: none;
        }
        .table thead th:hover { background-color: #3d5566 !important; }
        .table tbody tr { background-color: #ffffff; }
        .table tbody td { padding: 10px 10px; vertical-align: middle; border-bottom: 1px solid #f1f1f1; font-size: 12px; }
        .table tbody tr:hover { background-color: rgba(41,67,90,0.04); }
        .table tfoot { position: sticky; bottom: 0; z-index: 20; }
        .table tfoot tr, .table tfoot td { background-color: #dfe3e8 !important; font-weight: 700; font-size: 12px; }
        .table-bordered { border: 1px solid #dee2e6; width: 100%; }
        .table-bordered th, .table-bordered td { border: 1px solid #dee2e6; padding: 12px; vertical-align: top; }
        .table-responsive { display: block; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .orgao-link { color: #006a82; text-decoration: none; font-weight: 400; cursor: pointer; }
        .orgao-link:hover { color: var(--accent-red); text-decoration: underline; }
        .sortable-header { cursor: pointer; position: relative; padding-right: 22px !important; }
        .sortable-header:hover { background-color: #3d5566 !important; }
        .sortable-header i, .sortable-header .material-icons { font-size: 13px; position: absolute; right: 5px; top: 50%; transform: translateY(-50%); opacity: 0.8; }

        /* ============================================================
           9. TAGS DE SITUAÇÃO
        ============================================================ */
        .tag-andamento  { display:inline-block; padding:3px 8px; border-radius:20px; font-size:10.5px; font-weight:700; background:rgba(255,193,7,0.12); color:#856404; border:1px solid #ffe082; }
        .tag-concluida  { display:inline-block; padding:3px 8px; border-radius:20px; font-size:10.5px; font-weight:700; background:rgba(40,167,69,0.12); color:#0f6b3a; border:1px solid #b2e6c8; }
        .tag-encerrado  { display:inline-block; padding:3px 8px; border-radius:20px; font-size:10.5px; font-weight:700; background:rgba(23,162,184,0.12); color:#0e6e7f; border:1px solid #b0e8f0; }
        .tag-paralisado { display:inline-block; padding:3px 8px; border-radius:20px; font-size:10.5px; font-weight:700; background:rgba(185,60,66,0.1); color:#8b1a22; border:1px solid #f5b8bc; }

        /* ============================================================
           10. BOTÕES
        ============================================================ */
        .btn-pesquisa {
            background: linear-gradient(to right, #20445d, #20445d);
            border: none;
            padding: 0 16px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 13px;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            height: 36px;
            white-space: nowrap;
        }
        .btn-pesquisa:hover { background: linear-gradient(to right, var(--accent-red), #a32c32); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(185,60,66,0.2); color: white; }
        .btn-primary-custom { background: linear-gradient(to right, #20445d, #20445d); border: none; padding: 0 16px; font-weight: 600; border-radius: 6px; transition: all 0.3s ease; font-size: 13px; color: white; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; height: 36px; white-space: nowrap; }
        .btn-primary-custom:hover { background: linear-gradient(to right, var(--accent-red), #a32c32); transform: translateY(-1px); color: white; }
        .btn-secondary-custom {
            background: white;
            border: 2px solid var(--primary-darker);
            color: var(--primary-darker);
            padding: 0 16px;
            font-weight: 600;
            font-size: 13px;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            height: 36px;
            white-space: nowrap;
            text-decoration: none !important;
        }
        .btn-secondary-custom:hover { background-color: #132837 !important; color: white !important; border-color: #132837 !important; }
        .btn-export {
            appearance: none;
            -webkit-appearance: none;
            background: transparent !important;
            border: 1px solid #d6dee6;
            color: #1a3a5c;
            padding: 0 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-export .material-icons, .btn-export i { font-size: 14px !important; }
        button.btn-export:hover, a.btn-export:hover { background-color: #1a3a5c !important; border-color: #1a3a5c !important; color: #ffffff !important; }
        .btn-action {
            padding: 4px;
            border-radius: 7px;
            border: 1.5px solid #1a3a5c;
            background-color: #ffffff;
            color: #1a3a5c;
            width: 32px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-action:hover { background-color: #1a3a5c; color: #ffffff; }
        .btn-topo {
            background: #eeeff5;
            color: #1a3a5c;
            border: 1px solid #d6dee6;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            height: 32px;
        }
        .btn-topo:hover { background-color: #1a3a5c; color: #ffffff; border-color: #1a3a5c; }

        /* ============================================================
           11. NAVEGAÇÃO (abas)
        ============================================================ */
        .nav-tabs-container { background: transparent; padding: 10px 0; margin-top: 15px; margin-bottom: 15px; width: 100%; }
        .nav-tabs { border: none !important; gap: 10px; width: 100%; flex-wrap: wrap; }
        .nav-tabs .nav-link {
            border: none !important;
            background: #ffffff !important;
            border-radius: 10px !important;
            padding: 8px 18px !important;
            font-weight: 500;
            font-size: 14px;
            color: #1a3a5c !important;
            display: inline-flex !important;
            align-items: center;
            gap: 6px;
            transition: all .25s ease;
        }
        .nav-tabs .nav-link:hover { background: #e6e9ed !important; }
        .nav-tabs .nav-link.active { background: #234c63 !important; color: #fff !important; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .nav-tabs .material-icons { font-size: 14px !important; }

        /* ============================================================
           12. MODAL
        ============================================================ */
        .modal-creative .modal-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white !important;
            padding: 15px 20px;
            border-bottom: none;
        }
        .modal-creative .modal-header .modal-title { color: white !important; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .modal-creative .modal-header .btn-close { filter: brightness(0) invert(1); opacity: 1; }
        .modal-creative .modal-header .btn-close:hover { opacity: 0.8; }
        .modal-creative .modal-header .btn-export:hover { background-color: rgba(255,255,255,0.3) !important; border-color: rgba(255,255,255,0.7) !important; color: white !important; }

        .info-card {
            background: #f8fafd;
            border-radius: 10px;
            padding: 13px 16px;
            margin-bottom: 13px;
            border: 1px solid #e2e8f0;
        }
        .info-label { font-size: 11px; text-transform: uppercase; color: #6c757d; font-weight: 600; margin-bottom: 5px; }
        .info-value { font-size: 13px; font-weight: 600; color: var(--primary-dark); word-break: break-word; }
        .info-value.highlight { font-size: 16px; color: var(--accent-red); }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .objeto-container {
            background: #f8fafd;
            border-radius: 10px;
            padding: 13px 16px;
            margin-bottom: 13px;
            border: 1px solid #e2e8f0;
        }
        .objeto-container h5 { font-size: 13px; font-weight: 700; color: #1a3a5c; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; margin-bottom: 8px; }

        /* ============================================================
           13. PAGINAÇÃO
        ============================================================ */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            width: 100%;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pagination-info { font-size: 12px; color: #6c757d; }
        .pagination .page-link { color: var(--primary-dark); border-color: #dee2e6; font-size: 13px; padding: 4px 10px; }
        .pagination .page-link:hover { color: var(--accent-red); background-color: #f8f9fa; }
        .pagination .page-item.active .page-link { background-color: var(--primary-dark); border-color: var(--primary-dark); color: white; }
        .items-per-page {
            height: 34px;
            min-width: 80px;
            border-radius: 8px;
            border: 1px solid #d6dee6;
            padding: 4px 28px 4px 10px;
            font-size: 13px;
            font-weight: 600;
            color: #1a3a5c;
            background-color: #ffffff;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%231a3a5c' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 6px center;
        }

        /* ============================================================
           14. BUSCA NA TABELA
        ============================================================ */
        .table-search-container {
            display: flex;
            align-items: center;
            white-space: nowrap;
            background: #ffffff;
            border: 1px solid #d6dee6;
            border-radius: 8px;
            padding: 5px 10px;
            height: 34px;
        }
        .table-search-container:hover { border-color: #1a3a5c; }
        .table-search-input { border: none !important; outline: none; background: transparent; font-size: 12px; width: 180px; color: #1a3a5c; }
        .table-search-input::placeholder { color: #94a3b8; }

        /* ============================================================
           15. TOOLBAR
        ============================================================ */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .toolbar-left  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        /* ============================================================
           16. LOADING
        ============================================================ */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(238,241,246,0.95);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 14px;
        }
        .loading-progress { font-size: 13px; color: #20445d; font-weight: 700; }

        /* ============================================================
           17. TOAST
        ============================================================ */
        .toast-sucesso {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #e6f4ea;
            color: #1e4620;
            border-radius: 12px;
            padding: 14px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 9999;
            min-width: 280px;
        }
        .toast-content { display: flex; align-items: center; justify-content: center; width: 100%; text-align: center; gap: 10px; }
        .toast-content i { color: #28a745; font-size: 14px; }
        .toast-close { cursor: pointer; font-size: 14px; margin-left: 10px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ============================================================
           18. BARRA DE PROGRESSO
        ============================================================ */
        .progresso-barra {
            width: 100%;
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 3px;
        }
        .progresso-preenchimento {
            height: 100%;
            background: linear-gradient(to right, #20445d, #3a7cb8);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* ============================================================
           19. METADADOS
        ============================================================ */
        .metadata-section { background: white; border-radius: 10px; padding: 20px; margin-top: 20px; box-shadow: 0 3px 12px rgba(0,0,0,0.06); }
        .metadata-section h5 { font-size: 13px; font-weight: 700; color: #1a3a5c; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
        .metadata-section h6 { font-size: 12px; font-weight: 700; color: #1a3a5c; margin: 16px 0 8px; text-transform: uppercase; background: #f0f4f8; padding: 6px 10px; border-radius: 4px; }

        /* ============================================================
           20. CARDS DE LINKS (DOWNLOADS)
        ============================================================ */
        .links-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .link-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

<script>
    // ============================================================
    // CONFIGURAÇÕES E VARIÁVEIS GLOBAIS
    // ============================================================
    const BASE_URL = 'https://raw.githubusercontent.com/transparencia-mg/obras/main/dataset/data/';
    const GITHUB_API_OBRAS = 'https://api.github.com/repos/transparencia-mg/obras/commits?path=dataset/data/obra.csv&per_page=1';
    const ARQUIVOS = {
        contratos: 'contratos.csv',

        municipios: 'municipios.csv',

        contratos_siad: 'contratos_siad.csv',
        itens: 'itens.csv'
    };

    const dataCache = {};
    let currentDisplayData = {
        contratos: [], obras: [], fiscais: [], municipios: [],
        coordenadas: [], trechos: [], situacao: [], painel: [],
        contratos_siad: [], itens: [],
        metrica: { totalContratos: 0, totalAndamento: 0, totalConcluidas: 0, totalEncerradas: 0, valorTotal: 0 }
    };
    let dadosFiltrados = { contratos: [], fiscais: [], valores: [] };
    let paginacao = {
        geral:     { page: 1, itemsPerPage: 25 },
        contratos: { page: 1, itemsPerPage: 25 },
        fiscais:   { page: 1, itemsPerPage: 25 },
        valores:   { page: 1, itemsPerPage: 25 }
    };
    let sortConfig = {
        geral:     { coluna: 'total',                       direcao: 'desc' },
        contratos: { coluna: 'ano',                         direcao: 'desc' },
        fiscais:   { coluna: 'fiscal',                      direcao: 'asc'  },
        valores:   { coluna: 'valor_total_do_contrato',     direcao: 'desc' }
    };
    let opcoesCache = { anos: [], orgaos: [], situacoes: [], municipios: [], empresas: [], fiscais: [], tiposObra: [] };
    let filtrosAtivos = {
        visaoGeral: { ano: '', situacao: '', orgao: '', municipio: '', contrato: '' },
        contratos:  { ano: '', situacao: '', numero: '', portal: '', empresa: '', orgao: '', municipio: '', objeto: '', modLicitacao: '', buscaTabela: '' },
        fiscais:    { ano: '', nome: '', conselho: '', cargo: '', contrato: '', portal: '', orgao: '', buscaTabela: '' },
        valores:    { ano: '', contrato: '', situacao: '', buscaTabela: '' }
    };
    const chartPalette = ['#2f4b63','#39a585','#5f6f7f','#f28c28','#7aa6c2','#8e44ad','#c0392b','#16a085','#d35400','#2980b9'];
    let charts = {};
    let modalContratoAtual = null; // contrato atualmente aberto no modal

    // Configuração de colunas visíveis na tabela de contratos
    // Colunas fixas: contrato_siad, contrato_der (opcional), processo_compra (obrigatórias)
    const COLUNAS_CONTRATOS = {
        contrato_original:  { label: 'CONTRATO DER (opcional)',  visivel: true  },
        situacao:           { label: 'Situação',                 visivel: true  },
        legislacao:         { label: 'Legislação',               visivel: false },
        proc_espec:         { label: 'Mod. Licitação',           visivel: true  },
        ano:                { label: 'Ano',                      visivel: false },
        orgao:              { label: 'Órgão',                    visivel: true  },
        razao_social:       { label: 'Empresa',                  visivel: true  },
        cnpj:               { label: 'CNPJ/CPF',                visivel: true  },
        objeto:             { label: 'Objeto',                   visivel: true  },
        inicio:             { label: 'Data Assinatura',          visivel: true  },
        vigencia:           { label: 'Data Vigência',            visivel: true  },
        termino:            { label: 'Fim da Vigência',          visivel: true  },
        valor:              { label: 'Valor do Contrato',        visivel: true  },
        proc_det1:          { label: 'Proc. Cont. Det.1',        visivel: false },
    };

    // Cache global para dados de licitações (numero_contrato → {edital, contrato})
    let licitacoesCache = null;
    const LICITACOES_URLS = [
        'https://raw.githubusercontent.com/transparencia-mg/portal_licitacoes_mg/refs/heads/main/dataset/data/licitacoes2026.csv',
        'https://raw.githubusercontent.com/transparencia-mg/portal_licitacoes_mg/refs/heads/main/dataset/data/licitacoes2025.csv',
        'https://raw.githubusercontent.com/transparencia-mg/portal_licitacoes_mg/refs/heads/main/dataset/data/licitacoes2024.csv',
        'https://raw.githubusercontent.com/transparencia-mg/portal_licitacoes_mg/refs/heads/main/dataset/data/licitacoes2023.csv',
        'https://raw.githubusercontent.com/transparencia-mg/portal_licitacoes_mg/refs/heads/main/dataset/data/licitacoes2022.csv'
    ];
    async function carregarLicitacoes() {
        if (licitacoesCache !== null) return licitacoesCache;
        licitacoesCache = {};
        const promises = LICITACOES_URLS.map(url => new Promise(resolve => {
            Papa.parse(url, { download: true, header: true, skipEmptyLines: true,
                complete: results => {
                    results.data.forEach(row => {
                        const num = (row.numero_contrato || '').trim();
                        if (num) licitacoesCache[num] = {
                            edital: (row.edital_retificacao_arquivos||'').trim(),
                            contrato: (row.contrato_termoaditivos_arquivos||'').trim(),
                            objeto: (row.objeto_processo||'').trim(),
                            modalidade: (row.procedimento_contratacao_detalhamento_1||'').trim(),
                            grupo: (row.procedimento_contratacao_grupo||'').trim(),
                            especializacao: (row.procedimento_contratacao_especializacao||'').trim(),
                            situacao: (row.situacao_processo||'').trim(),
                            numero_processo: (row.numero_processo_formatado||'').trim(),
                            ano_criacao: (row.ano_criacao_pedido||'').trim(),
                            ano_assinatura: (row.ano_assinatura_contrato||'').trim(),
                            data_licitacao: (row.data_licitacao||'').trim(),
                            criterio: (row.criterio_julgamento||'').trim(),
                            valor_referencia: (row.valor_total_referencia_item_processo||'').trim(),
                            valor_homologado: (row.valor_total_homologado||'').trim(),
                            razao_social: (row.razao_social_fornecedor||row.nome_empresarial_nome_fornecedor||'').trim(),
                            cnpj: (row.cnpj_cpf||'').trim(),
                            numero_contrato_siad: num
                        };
                    });
                    resolve();
                }, error: () => resolve()
            });
        }));
        await Promise.all(promises);
        return licitacoesCache;
    }

    /**
     * Extrai o número limpo do contrato a partir de formatos como:
     *   DC-9493122/2026  →  9493122
     *   9493122/2026     →  9493122
     *   CT-0012345/2025  →  0012345
     */
    function extrairNumeroContrato(contratoStr) {
        if (!contratoStr) return null;
        // Remove prefixos de letras/traços: ex. "DC-", "CT-", "CA-" etc.
        const semPrefixo = String(contratoStr).replace(/^[A-Za-z]+-?/i, '').trim();
        // Extrai a parte numérica antes da barra
        const m = semPrefixo.match(/^(\d+)/);
        return m ? m[1] : null;
    }

    /**
     * Transforma o campo portal_de_compras do formato compacto para o formato legível
     * e gera a URL do ComprasMG.
     *
     * Lógica confirmada pelos exemplos reais:
     *   230152003425  →  2301520 000034/2025
     *   23017620125   →  2301762 000001/2025
     *
     *   - Últimos 2 dígitos           = sufixo do ano  (ex: 25 → 2025)
     *   - Primeiros 7 dígitos         = código da unidade compradora
     *   - Dígitos entre pos 7 e -2    = número do processo (pad até 6 dígitos)
     *
     * URL: https://www1.compras.mg.gov.br/processocompra/processo/consultaProcessoCompra.html
     *       ?metodo=pesquisar&codigoUnidadeCompra=2301520&numero=000034&ano=2025
     */
    function transformarPortalCompras(raw) {
        if (!raw) return { texto: null, url: null };
        const s = String(raw).replace(/\D/g, ''); // só dígitos

        // Já está no formato legível "2301520 000034/2025"
        const mLeg = String(raw).match(/(\d+)\s+(\d+)\/(\d{4})/);
        if (mLeg) {
            const unidade = mLeg[1], numero = mLeg[2].padStart(6, '0'), ano = mLeg[3];
            const url = `https://www1.compras.mg.gov.br/processocompra/processo/consultaProcessoCompra.html?metodo=pesquisar&codigoUnidadeCompra=${unidade}&numero=${numero}&ano=${ano}`;
            return { texto: `${unidade} ${numero}/${ano}`, url };
        }

        // Formato compacto: mínimo 9 dígitos (7 unidade + ≥0 numero + 2 ano)
        if (s.length < 9) return { texto: raw || null, url: null };

        const ano     = '20' + s.slice(-2);           // últimos 2 → ano completo
        const unidade = s.slice(0, 7);                 // primeiros 7 → unidade
        const numero  = s.slice(7, -2).padStart(6, '0'); // meio → número processo

        const url = `https://www1.compras.mg.gov.br/processocompra/processo/consultaProcessoCompra.html?metodo=pesquisar&codigoUnidadeCompra=${unidade}&numero=${numero}&ano=${ano}`;
        return { texto: `${unidade} ${numero}/${ano}`, url };
    }

    // ============================================================
    // AUXILIARES
    // ============================================================
    function mostrarLoading(show, msg) {
        const el = document.getElementById('loadingOverlay');
        el.style.display = show ? 'flex' : 'none';
        if (msg) document.getElementById('loadingProgress').textContent = msg;
    }

    function iframeUpdateHeight() {
        const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 10;
        try { if (window.parent && window.parent !== window) window.parent.postMessage({ iframeHeight: h, type: 'resize' }, '*'); } catch(e) {}
    }

    function voltarAoTopo() {
        // Tenta scroll direto no pai (same-origin)
        try {
            if (window.parent && window.parent !== window) {
                window.parent.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }
        } catch(e) {}
        // Cross-origin: envia mensagem postMessage para o pai fazer o scroll
        try {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ action: 'scrollToTop' }, '*');
                return;
            }
        } catch(e) {}
        // Fallback: scroll no próprio documento
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
    }

    function copiarLinkDireto() {
        navigator.clipboard.writeText(window.location.href)
            .then(() => {
                const toast = document.getElementById('toastSucesso');
                toast.style.display = 'flex';
                toast.style.animation = 'fadeInUp 0.3s ease';
                setTimeout(() => { toast.style.display = 'none'; }, 3000);
            })
            .catch(() => alert('Erro ao copiar o link'));
    }

    function formatarMoeda(v) { return (v||0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function formatarData(d) {
        if (!d) return '-';
        const s = String(d).trim();
        // Formato ISO: AAAA-MM-DD (ou AAAA-MM-DDThh:mm:ss)
        const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (isoMatch) return `${isoMatch[3]}/${isoMatch[2]}/${isoMatch[1]}`;
        // Formato estranho: "DD HH:MM:SS/MM/AAAA" → ex: "10 00:00:00/09/2027"
        const estrMatch = s.match(/^(\d{1,2})\s+[\d:]+\/(\d{2})\/(\d{4})/);
        if (estrMatch) return `${String(estrMatch[1]).padStart(2,'0')}/${estrMatch[2]}/${estrMatch[3]}`;
        // Já no formato DD/MM/AAAA
        if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
        // Fallback: tenta separar por traço
        const parts = s.split('-');
        if (parts.length === 3 && parts[0].length === 4) return `${parts[2].substring(0,2)}/${parts[1]}/${parts[0]}`;
        return s;
    }
    function truncate(s, l) { return s?.length > l ? s.substring(0, l) + '...' : s || '-'; }
    function getSituacaoClass(s) {
        if (!s) return 'tag-encerrado';
        if (s.includes('Andamento'))  return 'tag-andamento';
        if (s.includes('concluída'))  return 'tag-concluida';
        if (s.includes('Encerrado'))  return 'tag-encerrado';
        if (s.includes('Paralisado')) return 'tag-paralisado';
        return 'tag-encerrado';
    }

    // ============================================================
    // DATA DE ATUALIZAÇÃO — via GitHub API
    // ============================================================
    async function setupAtualizacaoData() {
        const el = document.getElementById('data-atualizacao-header');
        try {
            const resp = await fetch(GITHUB_API_OBRAS);
            if (!resp.ok) throw new Error();
            const commits = await resp.json();
            if (commits && commits.length > 0) {
                el.textContent = new Date(commits[0].commit.committer.date).toLocaleDateString('pt-BR');
                return;
            }
        } catch(e) {}
        el.textContent = 'Não disponível';
    }

    // ============================================================
    // CARREGAMENTO DOS DADOS
    // ============================================================
    async function carregarDadosIniciais() {
        mostrarLoading(true, 'Carregando dados de obras...');
        try {
            const promises = Object.entries(ARQUIVOS).map(([key, filename]) => {
                const url = BASE_URL + filename;
                return new Promise((resolve) => {
                    Papa.parse(url, {
                        download: true, header: true, skipEmptyLines: true,
                        encoding: 'UTF-8', delimiter: ';',
                        complete: (results) => {
                            if (results.data && results.data.length > 0) {
                                dataCache[key] = results.data;
                                currentDisplayData[key] = results.data;
                            }
                            resolve();
                        },
                        error: () => resolve()
                    });
                });
            });
            await Promise.all(promises);
            processarDados();
            atualizarOpcoesCache();
            renderizarVisaoGeral();
            renderizarContratos();
            renderizarItens();
            renderizarFiscais();
            renderizarValores();
            renderizarDicionario();
            renderizarDownloads();
            setTimeout(iframeUpdateHeight, 300);
        } catch(erro) {
            console.error('Erro no carregamento:', erro);
        } finally {
            mostrarLoading(false);
        }
    }

    function processarDados() {
        // ── CONTRATOS_SIAD: indexar por Número Contrato ──────────────
        const siadPorNumero = {};
        if (dataCache.contratos_siad) {
            currentDisplayData.contratos_siad = dataCache.contratos_siad.map(r => ({...r}));
            dataCache.contratos_siad.forEach(r => {
                const numRaw = (r['Número Contrato']||r['numero_contrato']||'').trim();
                if (numRaw) {
                    // Indexa pelo número bruto E pelo número normalizado (sem zeros à esquerda/prefixos)
                    // para garantir o match independente do formato em ambos os lados
                    const numNorm = extrairNumeroContrato(numRaw) || numRaw;
                    const keys = new Set([numRaw, numNorm]);
                    keys.forEach(k => {
                        if (!siadPorNumero[k]) siadPorNumero[k] = [];
                        siadPorNumero[k].push(r);
                    });
                }
            });
        }
        // ── ITENS: indexar por Número Contrato ───────────────────────
        const itensPorContrato = {};
        if (dataCache.itens) {
            currentDisplayData.itens = dataCache.itens.map(r => ({...r}));
            dataCache.itens.forEach(r => {
                const num = (r['contrato_siad']||r['Número Contrato']||r['numero_contrato']||'').trim();
                if (num) {
                    if (!itensPorContrato[num]) itensPorContrato[num] = [];
                    itensPorContrato[num].push(r);
                }
            });
        }

        if (dataCache.contratos) {
            currentDisplayData.contratos = dataCache.contratos.map(c => {
                // Usa diretamente a coluna contrato_siad (já mapeada em todos os arquivos)
                // com fallback para extração do número a partir do campo contrato (legado)
                const contrato_siad_direto = (c.contrato_siad||'').trim();
                const numContratoLegado    = extrairNumeroContrato(c.contrato?.trim()||'');
                // Busca no índice SIAD: prioridade para contrato_siad direto, depois legado
                const siadRows = contrato_siad_direto
                    ? (siadPorNumero[contrato_siad_direto] || siadPorNumero[extrairNumeroContrato(contrato_siad_direto)||''] || [])
                    : (numContratoLegado ? (siadPorNumero[numContratoLegado] || []) : []);
                const siad = siadRows[0] || null;
                // contrato_siad_raw: usa coluna direta (prioridade) ou fallback do SIAD
                const contrato_siad_raw   = contrato_siad_direto || (siad ? (siad['Número Contrato']||'').trim() : '');
                const razao_social_siad   = siad ? (siad['Razão Social Fornecedor']||siad['Nome Empresarial/Nome Fornecedor']||siad['razao_social_fornecedor']||'').trim() : '';
                const cnpj_siad           = siad ? (siad['CNPJ/CPF']||siad['cnpj_cpf']||'').trim() : '';
                const numero_processo_siad= siad ? (siad['Número Processo - Formatado']||siad['numero_processo_formatado']||'').trim() : '';
                // Links direto das colunas da tabela contratos_siad
                const contrato_link_siad  = siad ? (siad['Contrato_TermoAditivo Arquivos']||siad['contrato_termoaditivo_arquivos']||'').trim() : '';
                const edital_link_siad    = siad ? (siad['Edital_Retificação Arquivos']||siad['edital_retificacao_arquivos']||'').trim() : '';
                const proc_grupo          = siad ? (siad['Procedimento Contratação - Grupo']||siad['procedimento_contratacao_grupo']||'').trim() : '';
                const proc_det1           = siad ? (siad['Procedimento Contratação - Detalhamento 1']||siad['procedimento_contratacao_detalhamento_1']||'').trim() : '';
                const proc_espec          = siad ? (siad['Procedimento Contratação - Especialização']||siad['procedimento_contratacao_especializacao']||'').trim() : '';
                const ano_ass_siad        = siad ? (siad['Ano Assinatura Contrato']||siad['ano_assinatura_contrato']||'').trim() : '';

                return {
                    contrato: c.contrato?.trim() || '',
                    contrato_siad_raw: contrato_siad_raw,
                    numero_contrato_siad: contrato_siad_raw || '',
                    portal_de_compras: c.portal_de_compras?.trim() || '',
                    numero_processo_siad: numero_processo_siad,
                    contrato_link_siad: contrato_link_siad,
                    edital_link_siad: edital_link_siad,
                    orgao_entidade_contratante: c.orgao_entidade_contratante?.trim() || '',
                    empresa: c.empresa?.trim() || '',
                    razao_social_siad: razao_social_siad,
                    cnpj_siad: cnpj_siad,
                    proc_grupo: proc_grupo,
                    proc_det1: proc_det1,
                    proc_espec: proc_espec,
                    ano_ass_siad: ano_ass_siad,
                    objeto: c.objeto?.trim() || '',
                    situacao: c.situacao?.trim() || '',
                    data_assinatura: c.data_assinatura?.trim() || '',
                    data_inicio_vigencia: (c.data_inicio_vigencia||c['data_inicio_vigencia']||c.data_assinatura||'').trim(),
                    termino_execucao: c.termino_execucao?.trim() || '',
                    valor_inicial_do_contrato:      parseFloat(String(c.valor_inicial_do_contrato||'0').replace(',','.'))      || 0,
                    valor_em_aditivos:              parseFloat(String(c.valor_em_aditivos||'0').replace(',','.'))              || 0,
                    valor_total_do_contrato:        parseFloat(String(c.valor_total_do_contrato||'0').replace(',','.'))        || 0,
                    valor_medido_precos_iniciais:   parseFloat(String(c.valor_medido_precos_iniciais||'0').replace(',','.'))   || 0,
                    valor_medido_reajuste:          parseFloat(String(c.valor_medido_reajuste||'0').replace(',','.'))          || 0,
                    total_medido:                   parseFloat(String(c.total_medido||'0').replace(',','.'))                   || 0,
                    saldo_contratual:               parseFloat(String(c.saldo_contratual||'0').replace(',','.'))               || 0,
                    percentual_execucao_contrato:   parseFloat(String(c.percentual_execucao_contrato||'0').replace(',','.'))   || 0,
                    ano_assinatura: c.data_assinatura ? c.data_assinatura.split('-')[0] : (ano_ass_siad || ''),
                    siad_rows: siadRows,
                    itens_siad: contrato_siad_raw ? (itensPorContrato[contrato_siad_raw] || []) : []
                };
            });
        }
        if (dataCache.obras)      currentDisplayData.obras      = dataCache.obras.map(o      => ({ ...o, contrato: o.contrato?.trim()||'', obra: o.obra?.trim()||'', detipoobra: o.detipoobra?.trim()||'', valor_inicial_da_obra: parseFloat(String(o.valor_inicial_da_obra||'0').replace(',','.'))||0, valor_total_da_obra: parseFloat(String(o.valor_total_da_obra||'0').replace(',','.'))||0, valor_medido_precos_iniciais: parseFloat(String(o.valor_medido_precos_iniciais||'0').replace(',','.'))||0, saldo_de_valor_da_obra: parseFloat(String(o.saldo_de_valor_da_obra||'0').replace(',','.'))||0 }));
        if (dataCache.fiscais)    currentDisplayData.fiscais    = dataCache.fiscais.map(f    => ({ ...f, contrato: f.contrato?.trim()||'', nome: f.nome?.trim()||'', conselho: f.conselho?.trim()||'', cargo: f.cargo?.trim()||'', obra: f.obra?.trim()||'' }));
        if (dataCache.municipios) currentDisplayData.municipios = dataCache.municipios.map(m => ({ ...m, contrato: m.contrato?.trim()||'', municipio: m.municipio?.trim()||'' }));
        if (dataCache.coordenadas) currentDisplayData.coordenadas = dataCache.coordenadas.map(coord => ({ ...coord, contrato: coord.contrato?.trim()||'', latitude: coord.latitude?.trim()||'', longitude: coord.longitude?.trim()||'' }));
        if (dataCache.trechos)    currentDisplayData.trechos    = dataCache.trechos.map(t    => ({ ...t, contrato: t.contrato?.trim()||'' }));
        if (dataCache.situacao)   currentDisplayData.situacao   = dataCache.situacao.map(s   => ({ ...s, contrato: s.contrato?.trim()||'', status: s.status?.trim()||'', descricao_do_motivo: s.descricao_do_motivo?.trim()||'', data: s.data?.trim()||'', responsavel: (s.responsavel?.trim()||'').replace(/\bDiretor Geral\b(?!\s*-\s*DRE)/g, 'Diretor Geral - DRE') }));
        if (dataCache.painel)     currentDisplayData.painel     = dataCache.painel.map(p => ({ ...p, contrato: p.contrato?.trim()||'' }));

        const situacaoPorContrato = {};
        currentDisplayData.situacao.forEach(s => { if (!situacaoPorContrato[s.contrato]) situacaoPorContrato[s.contrato] = []; situacaoPorContrato[s.contrato].push(s); });

        const painelPorContrato = {};
        if (currentDisplayData.painel) {
            currentDisplayData.painel.forEach(p => { if (!painelPorContrato[p.contrato]) painelPorContrato[p.contrato] = []; painelPorContrato[p.contrato].push(p); });
        }

        currentDisplayData.contratos.forEach(c => {
            c.obras_vinculadas       = currentDisplayData.obras.filter(o => o.contrato === c.contrato);
            c.municipios_vinculados  = currentDisplayData.municipios.filter(m => m.contrato === c.contrato).map(m => m.municipio).filter(Boolean);
            c.fiscais_vinculados     = currentDisplayData.fiscais.filter(f => f.contrato === c.contrato).map(f => f.nome).filter(Boolean);
            c.coordenadas_vinculadas = currentDisplayData.coordenadas.filter(coord => coord.contrato === c.contrato);
            c.trechos_vinculados     = currentDisplayData.trechos.filter(t => t.contrato === c.contrato);
            c.situacoes_vinculadas   = situacaoPorContrato[c.contrato] || [];
            c.painel_vinculado       = painelPorContrato[c.contrato] || [];
        });

        dadosFiltrados.contratos = [...currentDisplayData.contratos];
        dadosFiltrados.fiscais   = [...currentDisplayData.fiscais];
        dadosFiltrados.valores   = [...currentDisplayData.contratos];
        calcularMetricas();
    }

    function calcularMetricas() {
        const dados = currentDisplayData.contratos;
        currentDisplayData.metrica = {
            totalContratos: dados.length,
            totalAndamento: dados.filter(c => c.situacao?.includes('Andamento')).length,
            totalConcluidas: dados.filter(c => c.situacao?.includes('concluída')).length,
            totalEncerradas: dados.filter(c => c.situacao?.includes('Encerrado')).length,
            valorTotal: dados.reduce((acc, c) => acc + (c.valor_total_do_contrato||0), 0)
        };
    }

    function atualizarOpcoesCache() {
        const c = currentDisplayData.contratos;
        opcoesCache.anos      = [...new Set(c.map(c => c.ano_assinatura).filter(Boolean))].sort((a,b) => b - a);
        opcoesCache.orgaos    = [...new Set(c.map(c => c.orgao_entidade_contratante).filter(Boolean))].sort();
        opcoesCache.situacoes = [...new Set(c.map(c => c.situacao).filter(Boolean))].sort();
        opcoesCache.municipios= [...new Set(currentDisplayData.municipios.map(m => m.municipio).filter(Boolean))].sort();
        // Empresas: combina razao_social_siad (SIAD) e empresa (original), sem duplicatas
        const empresasSet = new Set();
        c.forEach(ct => { if (ct.razao_social_siad) empresasSet.add(ct.razao_social_siad); else if (ct.empresa) empresasSet.add(ct.empresa); });
        opcoesCache.empresas  = [...empresasSet].sort();
        opcoesCache.fiscais   = [...new Set(currentDisplayData.fiscais.map(f => f.nome).filter(Boolean))].sort();
        opcoesCache.tiposObra = [...new Set(currentDisplayData.obras.map(o => o.detipoobra).filter(Boolean))].sort();
    }

    // ============================================================
    // ORDENAÇÃO
    // ============================================================
    function ordenarTabela(tipo, coluna, tipoDado='text') {
        const config = sortConfig[tipo];
        if (config.coluna === coluna) config.direcao = config.direcao === 'asc' ? 'desc' : 'asc';
        else { config.coluna = coluna; config.direcao = (['orgao','fiscal','contrato'].includes(coluna)) ? 'asc' : 'desc'; }
        if      (tipo === 'geral')     renderizarVisaoGeral();
        else if (tipo === 'contratos') { ordenarArray(dadosFiltrados.contratos, coluna, config.direcao); renderizarTabelaContratos(); }
        else if (tipo === 'fiscais')   { ordenarArray(dadosFiltrados.fiscais,   coluna, config.direcao); renderizarTabelaFiscais(); }
        else if (tipo === 'valores')   { ordenarArray(dadosFiltrados.valores,   coluna, config.direcao); renderizarTabelaValores(); }
    }

    function ordenarArray(array, coluna, direcao) {
        const mapas = { orgao: 'orgao_entidade_contratante', portal: 'portal_de_compras', ano: 'ano_assinatura', empresa: 'empresa', objeto: 'objeto', inicio: 'data_assinatura', termino: 'termino_execucao', situacao: 'situacao', fiscal: 'nome', conselho: 'conselho', cargo: 'cargo', obra: 'obra', processo_compra: 'portal_de_compras', contrato_siad: 'contrato_siad_raw', contrato: 'contrato', valor: 'valor_total_do_contrato' };
        const numericCols = new Set(['total','andamento','concluidas','encerradas','valor','valor_inicial_do_contrato','valor_em_aditivos','valor_total_do_contrato','valor_medido_precos_iniciais','valor_medido_reajuste','total_medido','saldo_contratual','percentual_execucao_contrato']);
        const mult = direcao === 'asc' ? 1 : -1;
        array.sort((a, b) => {
            const field = mapas[coluna] || coluna;
            let va = a[field] ?? (numericCols.has(coluna) ? 0 : '');
            let vb = b[field] ?? (numericCols.has(coluna) ? 0 : '');
            if (coluna === 'ano') { va = parseInt(va)||0; vb = parseInt(vb)||0; }
            if (typeof va === 'string') return mult * va.toLowerCase().localeCompare(vb.toLowerCase());
            return mult * (va - vb);
        });
    }

    // ============================================================
    // FILTROS
    // ============================================================
    function filtrarContratos() {
        let f = [...currentDisplayData.contratos];
        const fc = filtrosAtivos.contratos;
        if (fc.ano)          f = f.filter(c => c.ano_assinatura === fc.ano);
        if (fc.situacao)     f = f.filter(c => c.situacao === fc.situacao);
        if (fc.numero)       f = f.filter(c => c.contrato?.toLowerCase().includes(fc.numero.toLowerCase()) || c.numero_contrato_siad?.toLowerCase().includes(fc.numero.toLowerCase()));
        if (fc.portal)       f = f.filter(c => c.portal_de_compras?.toLowerCase().includes(fc.portal.toLowerCase()) || c.numero_processo_siad?.toLowerCase().includes(fc.portal.toLowerCase()));
        if (fc.empresa)      f = f.filter(c => (c.razao_social_siad||c.empresa)?.toLowerCase().includes(fc.empresa.toLowerCase()));
        if (fc.orgao)        f = f.filter(c => c.orgao_entidade_contratante?.toLowerCase().includes(fc.orgao.toLowerCase()));
        if (fc.objeto)       f = f.filter(c => c.objeto?.toLowerCase().includes(fc.objeto.toLowerCase()));
        if (fc.modLicitacao) f = f.filter(c => c.proc_espec?.toLowerCase().includes(fc.modLicitacao.toLowerCase()) || c.proc_det1?.toLowerCase().includes(fc.modLicitacao.toLowerCase()) || c.proc_grupo?.toLowerCase().includes(fc.modLicitacao.toLowerCase()));
        if (fc.municipio)    { const mcs = currentDisplayData.municipios.filter(m => m.municipio?.toLowerCase().includes(fc.municipio.toLowerCase())).map(m => m.contrato); f = f.filter(c => mcs.includes(c.contrato)); }
        if (fc.buscaTabela)  { const t = fc.buscaTabela.toLowerCase(); f = f.filter(c => c.contrato?.toLowerCase().includes(t)||c.numero_contrato_siad?.toLowerCase().includes(t)||c.orgao_entidade_contratante?.toLowerCase().includes(t)||(c.razao_social_siad||c.empresa)?.toLowerCase().includes(t)||c.objeto?.toLowerCase().includes(t)||c.numero_processo_siad?.toLowerCase().includes(t)); }
        dadosFiltrados.contratos = f;
        paginacao.contratos.page = 1;
        renderizarTabelaContratos();
    }

    function filtrarFiscais() {
        let f = [...currentDisplayData.fiscais];
        const ff = filtrosAtivos.fiscais;
        if (ff.nome)     f = f.filter(x => x.nome?.toLowerCase().includes(ff.nome.toLowerCase()));
        if (ff.conselho) f = f.filter(x => x.conselho?.toLowerCase().includes(ff.conselho.toLowerCase()));
        if (ff.cargo)    f = f.filter(x => x.cargo?.toLowerCase().includes(ff.cargo.toLowerCase()));
        if (ff.contrato) f = f.filter(x => x.contrato?.toLowerCase().includes(ff.contrato.toLowerCase()));
        if (ff.ano) {
            const contratosPorAno = currentDisplayData.contratos.filter(c => c.ano_assinatura === ff.ano).map(c => c.contrato);
            f = f.filter(x => contratosPorAno.includes(x.contrato));
        }
        if (ff.portal) {
            const contratosPorPortal = currentDisplayData.contratos.filter(c => {
                const pt = transformarPortalCompras(c.portal_de_compras);
                return pt.texto?.toLowerCase().includes(ff.portal.toLowerCase()) || c.portal_de_compras?.toLowerCase().includes(ff.portal.toLowerCase());
            }).map(c => c.contrato);
            f = f.filter(x => contratosPorPortal.includes(x.contrato));
        }
        if (ff.orgao)    { const ocs = currentDisplayData.contratos.filter(c => c.orgao_entidade_contratante?.toLowerCase().includes(ff.orgao.toLowerCase())).map(c => c.contrato); f = f.filter(x => ocs.includes(x.contrato)); }
        if (ff.buscaTabela) { const t = ff.buscaTabela.toLowerCase(); f = f.filter(x => x.nome?.toLowerCase().includes(t)||x.contrato?.toLowerCase().includes(t)); }
        dadosFiltrados.fiscais = f;
        paginacao.fiscais.page = 1;
        renderizarTabelaFiscais();
    }

    function filtrarValores() {
        let f = [...currentDisplayData.contratos];
        const fv = filtrosAtivos.valores;
        if (fv.ano)      f = f.filter(c => c.ano_assinatura === fv.ano);
        if (fv.contrato) f = f.filter(c => c.contrato?.toLowerCase().includes(fv.contrato.toLowerCase()));
        if (fv.situacao) f = f.filter(c => c.situacao === fv.situacao);
        if (fv.buscaTabela) { const t = fv.buscaTabela.toLowerCase(); f = f.filter(c => c.contrato?.toLowerCase().includes(t)||c.orgao_entidade_contratante?.toLowerCase().includes(t)||c.empresa?.toLowerCase().includes(t)); }
        dadosFiltrados.valores = f;
        paginacao.valores.page = 1;
        renderizarTabelaValores();
    }

    function agruparPorOrgao(dados) {
        const mapa = new Map();
        dados.forEach(c => {
            const nome = c.orgao_entidade_contratante || 'Não informado';
            if (!mapa.has(nome)) mapa.set(nome, { orgao: nome, total: 0, andamento: 0, concluidas: 0, encerradas: 0, valor: 0 });
            const reg = mapa.get(nome);
            reg.total++; reg.valor += c.valor_total_do_contrato||0;
            if      (c.situacao?.includes('Andamento'))  reg.andamento++;
            else if (c.situacao?.includes('concluída'))  reg.concluidas++;
            else if (c.situacao?.includes('Encerrado'))  reg.encerradas++;
        });
        return Array.from(mapa.values());
    }

    // ============================================================
    // PAGINAÇÃO
    // ============================================================
    function renderizarPaginacao(tipo, totalPaginas, inicio, fim, total) {
        const Tipo = tipo.charAt(0).toUpperCase() + tipo.slice(1);
        const container = document.getElementById(`paginacaoContainer${Tipo}`);
        if (!container) return;
        const pagina = paginacao[tipo].page;
        let html = `<div class="pagination-info">Mostrando ${inicio+1}–${fim} de ${total.toLocaleString('pt-BR')} registros</div><nav><ul class="pagination mb-0">`;
        html += `<li class="page-item ${pagina===1?'disabled':''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}',${pagina-1});return false;">«</a></li>`;
        let ini = Math.max(1, pagina-2), fim2 = Math.min(totalPaginas, ini+4);
        for (let i=ini; i<=fim2; i++) html += `<li class="page-item ${i===pagina?'active':''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}',${i});return false;">${i}</a></li>`;
        html += `<li class="page-item ${pagina===totalPaginas?'disabled':''}"><a class="page-link" href="#" onclick="mudarPagina('${tipo}',${pagina+1});return false;">»</a></li></ul></nav>`;
        container.innerHTML = html;
    }

    window.mudarPagina = function(tipo, pagina) {
        let total;
        if (tipo === 'geral') {
            let dadosVG = [...currentDisplayData.contratos];
            const fvg = filtrosAtivos.visaoGeral;
            if (fvg.ano)       dadosVG = dadosVG.filter(c => c.ano_assinatura === fvg.ano);
            if (fvg.situacao)  dadosVG = dadosVG.filter(c => c.situacao === fvg.situacao);
            if (fvg.orgao)     dadosVG = dadosVG.filter(c => c.orgao_entidade_contratante?.toLowerCase().includes(fvg.orgao.toLowerCase()));
            if (fvg.contrato)  dadosVG = dadosVG.filter(c => c.contrato?.toLowerCase().includes(fvg.contrato.toLowerCase()));
            if (fvg.municipio) { const mcs = currentDisplayData.municipios.filter(m => m.municipio?.toLowerCase().includes(fvg.municipio.toLowerCase())).map(m => m.contrato); dadosVG = dadosVG.filter(c => mcs.includes(c.contrato)); }
            total = dadosVG.length;
        } else {
            const dados = tipo==='contratos' ? dadosFiltrados.contratos : tipo==='fiscais' ? dadosFiltrados.fiscais : dadosFiltrados.valores;
            total = dados.length;
        }
        const totalPaginas = Math.ceil(total / paginacao[tipo].itemsPerPage);
        if (pagina < 1 || pagina > totalPaginas) return;
        paginacao[tipo].page = pagina;
        if      (tipo==='geral')     renderizarVisaoGeral();
        else if (tipo==='contratos') renderizarTabelaContratos();
        else if (tipo==='fiscais')   renderizarTabelaFiscais();
        else if (tipo==='valores')   renderizarTabelaValores();
        setTimeout(iframeUpdateHeight, 100);
    };

    window.alterarItensPorPagina = function(tipo) {
        const Tipo = tipo.charAt(0).toUpperCase() + tipo.slice(1);
        const sel = document.getElementById(`itensPorPagina${Tipo}`);
        if (sel) { paginacao[tipo].itemsPerPage = parseInt(sel.value); paginacao[tipo].page = 1; }

        else if (tipo==='contratos') renderizarTabelaContratos();

    // ============================================================
    // RENDERIZAÇÃO — VISÃO GERAL
    // ============================================================
    function renderizarVisaoGeral() {
        const container = document.getElementById('visao-geral-content');

        const fvg = filtrosAtivos.visaoGeral;

        if (fvg.situacao)  dadosVG = dadosVG.filter(c => c.situacao === fvg.situacao);
        if (fvg.orgao)     dadosVG = dadosVG.filter(c => c.orgao_entidade_contratante?.toLowerCase().includes(fvg.orgao.toLowerCase()));
        if (fvg.contrato)  dadosVG = dadosVG.filter(c => c.contrato?.toLowerCase().includes(fvg.contrato.toLowerCase()));
        if (fvg.municipio) { const mcs = currentDisplayData.municipios.filter(m => m.municipio?.toLowerCase().includes(fvg.municipio.toLowerCase())).map(m => m.contrato); dadosVG = dadosVG.filter(c => mcs.includes(c.contrato)); }

        // Para os gráficos, calcular por ano

            const field = mapCols[scVG.coluna] || scVG.coluna;
            const numCols = new Set(['valor_inicial_do_contrato','valor_em_aditivos','valor_total_do_contrato','total_medido','saldo_contratual','percentual_execucao_contrato']);
            const mult = scVG.direcao === 'asc' ? 1 : -1;
            let va = a[field] ?? (numCols.has(field) ? 0 : '');
            let vb = b[field] ?? (numCols.has(field) ? 0 : '');

            return mult * (va - vb);
        });

        renderizarPaginacao('geral', totalPaginas, inicio, fim, totalContratos);
        setTimeout(() => { document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el)); }, 100);

    function renderizarTabelaContratos() {

        const pp = paginacao.contratos.itemsPerPage, page = paginacao.contratos.page;

        const sc = sortConfig.contratos;
        const iconCol = (col) => sc.coluna===col ? (sc.direcao==='asc'?'arrow_upward':'arrow_downward') : 'unfold_more';

        // Montar cabeçalho dinâmico
        const head = document.getElementById('tabelaContratosHead');
        if (head) {
            let thHtml = `
                <th class="sortable-header" onclick="ordenarTabela('contratos','contrato_siad')">CONTRATO SIAD <span class="material-icons">${iconCol('contrato_siad')}</span></th>`;
            if (COLUNAS_CONTRATOS.contrato_original.visivel) thHtml += `<th class="sortable-header" onclick="ordenarTabela('contratos','contrato')">CONTRATO DER <span class="material-icons">${iconCol('contrato')}</span></th>`;

            if (COLUNAS_CONTRATOS.legislacao.visivel) thHtml += `<th>Legislação</th>`;
            if (COLUNAS_CONTRATOS.proc_espec.visivel) thHtml += `<th>Mod. Licitação</th>`;
            if (COLUNAS_CONTRATOS.ano.visivel)        thHtml += `<th class="sortable-header text-center" onclick="ordenarTabela('contratos','ano','number')">Ano <span class="material-icons">${iconCol('ano')}</span></th>`;
            if (COLUNAS_CONTRATOS.orgao.visivel)      thHtml += `<th class="sortable-header" onclick="ordenarTabela('contratos','orgao')">Órgão <span class="material-icons">${iconCol('orgao')}</span></th>`;
            if (COLUNAS_CONTRATOS.razao_social.visivel) thHtml += `<th class="sortable-header" onclick="ordenarTabela('contratos','empresa')">Empresa <span class="material-icons">${iconCol('empresa')}</span></th>`;
            if (COLUNAS_CONTRATOS.cnpj.visivel)       thHtml += `<th>CNPJ/CPF</th>`;
            if (COLUNAS_CONTRATOS.objeto.visivel)     thHtml += `<th class="sortable-header" onclick="ordenarTabela('contratos','objeto')">Objeto <span class="material-icons">${iconCol('objeto')}</span></th>`;
            if (COLUNAS_CONTRATOS.inicio.visivel)     thHtml += `<th class="sortable-header text-center" onclick="ordenarTabela('contratos','inicio')">Data Assinatura <span class="material-icons">${iconCol('inicio')}</span></th>`;
            if (COLUNAS_CONTRATOS.vigencia.visivel)   thHtml += `<th class="text-center">Data Vigência</th>`;
            if (COLUNAS_CONTRATOS.termino.visivel)    thHtml += `<th class="sortable-header text-center" onclick="ordenarTabela('contratos','termino')">Fim da Vigência <span class="material-icons">${iconCol('termino')}</span></th>`;
            if (COLUNAS_CONTRATOS.valor.visivel)      thHtml += `<th class="sortable-header text-right" onclick="ordenarTabela('contratos','valor','number')">Valor do Contrato <span class="material-icons">${iconCol('valor')}</span></th>`;

            thHtml += `<th class="text-center">Ações</th>`;
            head.innerHTML = thHtml;
        }

        const tbody = document.getElementById('contratosTableBody');
        if (tbody) tbody.innerHTML = dados.slice(inicio,fim).map(c=>{
            // CONTRATO SIAD sem ícone de setinha
            const numSiad = c.contrato_siad_raw || c.numero_contrato_siad || '-';
            const linkDocSiad = c.contrato_link_siad;
            const numSiadCell = linkDocSiad
                ? `<a href="${linkDocSiad}" target="_blank" class="compra-link" title="Ver contrato/aditivos no SIAD">${numSiad}</a>`
                : `${numSiad}`;

            // Processo de Compras sem ícone de setinha
            let processoCelula = '-';
            if (c.numero_processo_siad) {
                const pt = transformarPortalCompras(c.portal_de_compras);
                const editalLink = c.edital_link_siad;
                if (editalLink) {
                    processoCelula = `<a href="${editalLink}" target="_blank" class="compra-link" title="Ver edital/retificação">${c.numero_processo_siad}</a>`;
                } else if (pt.url) {
                    processoCelula = `<a href="${pt.url}" target="_blank" class="compra-link" title="Acessar no ComprasMG">${c.numero_processo_siad}</a>`;
                } else {
                    processoCelula = c.numero_processo_siad;
                }
            } else {
                const pt = transformarPortalCompras(c.portal_de_compras);
                processoCelula = pt.url ? `<a href="${pt.url}" target="_blank" class="compra-link">${pt.texto}</a>` : (pt.texto || '-');
            }

            // Empresa: razao_social_siad tem prioridade; fallback para empresa original
            const empresaNome = c.razao_social_siad || c.empresa || '-';

            let rowHtml = `<tr>
                <td>${numSiadCell}</td>`;
            if (COLUNAS_CONTRATOS.contrato_original.visivel) rowHtml += `<td>${c.contrato||'-'}</td>`;
            rowHtml += `<td>${processoCelula}</td>`;
            if (COLUNAS_CONTRATOS.situacao.visivel)   rowHtml += `<td class="text-center"><span class="${getSituacaoClass(c.situacao)}">${c.situacao||'-'}</span></td>`;

            if (COLUNAS_CONTRATOS.proc_espec.visivel) rowHtml += `<td><small>${c.proc_espec||'-'}</small></td>`;
            if (COLUNAS_CONTRATOS.ano.visivel)        rowHtml += `<td class="text-center">${c.ano_assinatura||'-'}</td>`;
            if (COLUNAS_CONTRATOS.orgao.visivel)      rowHtml += `<td>${truncate(c.orgao_entidade_contratante,30)}</td>`;
            if (COLUNAS_CONTRATOS.razao_social.visivel) rowHtml += `<td>${truncate(empresaNome,25)}</td>`;
            if (COLUNAS_CONTRATOS.cnpj.visivel)       rowHtml += `<td><small>${c.cnpj_siad||'-'}</small></td>`;
            if (COLUNAS_CONTRATOS.objeto.visivel)     rowHtml += `<td title="${c.objeto||''}">${truncate(c.objeto,40)}</td>`;
            if (COLUNAS_CONTRATOS.inicio.visivel)     rowHtml += `<td class="text-center">${formatarData(c.data_assinatura)}</td>`;
            if (COLUNAS_CONTRATOS.vigencia.visivel)   rowHtml += `<td class="text-center">${formatarData(c.data_inicio_vigencia||c.data_assinatura)}</td>`;
            if (COLUNAS_CONTRATOS.termino.visivel)    rowHtml += `<td class="text-center">${formatarData(c.termino_execucao)}</td>`;
            if (COLUNAS_CONTRATOS.valor.visivel)      rowHtml += `<td class="text-right">R$ ${formatarMoeda(c.valor_total_do_contrato)}</td>`;
            if (COLUNAS_CONTRATOS.proc_det1.visivel)  rowHtml += `<td><small>${c.proc_det1||'-'}</small></td>`;
            rowHtml += `<td class="text-center"><button class="btn-action" title="Ver detalhes" onclick="verDetalhesContrato('${(c.contrato||'').replace(/'/g,"\\'")}')"><span class="material-icons" style="font-size:15px">visibility</span></button></td>
            </tr>`;
            return rowHtml;
        }).join('');
        const badge = document.getElementById('totalContratosBadge');
        if (badge) badge.textContent = `${total} contratos`;
        renderizarPaginacao('contratos', totalPags, inicio, fim, total);
        setTimeout(iframeUpdateHeight, 100);
    }

    function renderizarTabelaFiscais() {
        const dados = dadosFiltrados.fiscais;
        ordenarArray(dados, sortConfig.fiscais.coluna, sortConfig.fiscais.direcao);
        const total = dados.length;
        const pp = paginacao.fiscais.itemsPerPage, page = paginacao.fiscais.page;

        const tbody = document.getElementById('fiscaisTableBody');
        if (tbody) tbody.innerHTML = dados.slice(inicio,fim).map(f=>{
            const contrato = currentDisplayData.contratos.find(c => c.contrato === f.contrato);
            const ano = contrato?.ano_assinatura || '-';
            const contrato_siad_disp = contrato?.contrato_siad_raw || contrato?.numero_contrato_siad || '-';
            const contrato_link_siad_f = contrato?.contrato_link_siad || '';
            const edital_link_siad_f   = contrato?.edital_link_siad   || '';
            const pt = transformarPortalCompras(contrato?.portal_de_compras);
            const siadCell = contrato_link_siad_f
                ? `<a href="${contrato_link_siad_f}" target="_blank" class="compra-link" title="Ver contrato/aditivos no SIAD">${contrato_siad_disp}</a>`
                : contrato_siad_disp;
            let portalCell;
            if (contrato?.numero_processo_siad) {
                if (edital_link_siad_f) {
                    portalCell = `<a href="${edital_link_siad_f}" target="_blank" class="compra-link" title="Ver edital/retificação">${contrato.numero_processo_siad}</a>`;

                    portalCell = `<a href="${pt.url}" target="_blank" class="compra-link" title="Acessar no ComprasMG">${contrato.numero_processo_siad}</a>`;
                } else {
                    portalCell = contrato.numero_processo_siad;
                }
            } else {
                portalCell = pt?.url ? `<a href="${pt.url}" target="_blank" class="compra-link">${pt.texto}</a>` : (pt?.texto || '-');
            }
            return `
            <tr>
                <td><strong>${f.nome||'-'}</strong></td>
                <td>${f.conselho||'-'}</td>
                <td>${f.cargo||'-'}</td>

                <td>${f.contrato||'-'}</td>

        const badge = document.getElementById('totalFiscaisBadge');
