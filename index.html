    function filtrarItens(rerender=true) {
        let dados = currentDisplayData.itens.map(it => {
            const numContrato = (it['Número Contrato']||it['numero_contrato']||'').trim();
            const contrato = currentDisplayData.contratos.find(c => c.numero_contrato_siad === numContrato || c.contrato_siad_raw === numContrato);
            return {
                ...it,
                _contrato_der: contrato ? contrato.contrato : '',
                _contrato_siad: it['contrato_siad']||it['Número Contrato']||it['numero_contrato']||it['Contrato_SIAD']||'',
                _descricao: it['Item Material/Serviço']||it['item_material_servico']||'',
                _contrato_ref: contrato
            };
        });
        if (filtrosItens.contrato_siad) dados = dados.filter(it => it._contrato_siad?.toLowerCase().includes(filtrosItens.contrato_siad.toLowerCase()));
        if (filtrosItens.contrato)      dados = dados.filter(it => it._contrato_der?.toLowerCase().includes(filtrosItens.contrato.toLowerCase()));
        if (filtrosItens.descricao)     dados = dados.filter(it => it._descricao?.toLowerCase().includes(filtrosItens.descricao.toLowerCase()));
        if (filtrosItens.cod_mat)       dados = dados.filter(it => (it['codigo_item_material_servico_numerico']||it['Código Item Material/Serviço - Numérico']||it['codigo_item_material_servico']||'').toString().toLowerCase().includes(filtrosItens.cod_mat.toLowerCase()));
        if (filtrosItens.cod_elem)      dados = dados.filter(it => (it['Código Elemento Item Despesa']||it['codigo_elemento_item_despesa']||'').toString().toLowerCase().includes(filtrosItens.cod_elem.toLowerCase()));
        if (filtrosItens.elem_despesa)  dados = dados.filter(it => (it['Nome Elemento Item Despesa']||it['nome_elemento_item_despesa']||'').toLowerCase().includes(filtrosItens.elem_despesa.toLowerCase()));
        if (filtrosItens.buscaTabela) {
            const t = filtrosItens.buscaTabela.toLowerCase();
            dados = dados.filter(it => it._contrato_siad?.toLowerCase().includes(t)||it._contrato_der?.toLowerCase().includes(t)||it._descricao?.toLowerCase().includes(t));
        }
        // Ordenação
        const sc = sortConfigItens;
        const mult = sc.direcao === 'asc' ? 1 : -1;
        dados.sort((a,b) => {
            let va='', vb='';
            if (sc.coluna==='contrato_siad') { va=a._contrato_siad||''; vb=b._contrato_siad||''; }
            else if (sc.coluna==='contrato') { va=a._contrato_der||''; vb=b._contrato_der||''; }
            else if (sc.coluna==='descricao') { va=a._descricao||''; vb=b._descricao||''; }
            return mult * va.toLowerCase().localeCompare(vb.toLowerCase());
        });
        dadosFiltradosItens = dados;
        paginacaoItens.page = 1;
        if (rerender) renderizarTabelaItens();
    }

    function renderizarTabelaItens() {
        const dados = dadosFiltradosItens;
        const total = dados.length;
        const pp = paginacaoItens.itemsPerPage, page = paginacaoItens.page;
        const totalPags = Math.ceil(total/pp)||1, inicio = (page-1)*pp, fim = Math.min(inicio+pp,total);
        const tbody = document.getElementById('itensTableBody');
        if (tbody) tbody.innerHTML = dados.slice(inicio,fim).map(it=>{
            const numItem   = it['Número Item Pedido']||it['numero_item_pedido']||'-';
            const codMat    = it['codigo_item_material_servico_numerico']||it['Código Item Material/Serviço - Numérico']||it['codigo_item_material_servico']||'-';
            const descMat   = it['Item Material/Serviço']||it['item_material_servico']||'-';
            const codElem   = it['Código Elemento Item Despesa']||it['codigo_elemento_item_despesa']||'-';
            const descElem  = it['Nome Elemento Item Despesa']||it['nome_elemento_item_despesa']||'-';
            const qtd       = it['Quantidade Item Pedido']||it['quantidade_item_pedido']||'-';
            const vlUnit    = parseFloat(String(it['Valor Unitário Referência Item Processo']||it['valor_unitario_referencia']||'0').replace(',','.'))||0;
            const vlTotalR  = parseFloat(String(it['Valor Total Referência Item Processo']||it['valor_total_referencia']||'0').replace(',','.'))||0;
            const vlHomolog = parseFloat(String(it['Valor Total Homologado']||it['valor_total_homologado']||'0').replace(',','.'))||0;
            const contratoId = it._contrato_der || '';
            const siadLinkItens = it._contrato_ref?.contrato_link_siad || '';
            const siadCellItens = siadLinkItens
                ? `<a href="${siadLinkItens}" target="_blank" class="compra-link" title="Ver contrato/aditivos no SIAD">${it._contrato_siad||'-'}</a>`
                : `<strong style="color:#006a82">${it._contrato_siad||'-'}</strong>`;
            return `<tr>
                <td>${siadCellItens}</td>
                <td>${it._contrato_der||'-'}</td>
                <td class="text-center">${numItem}</td>
                <td><small>${codMat}</small></td>
                <td title="${descMat}">${truncate(descMat,35)}</td>
                <td><small>${codElem}</small></td>
                <td><small>${truncate(descElem,20)}</small></td>
                <td class="text-right">${qtd}</td>
                <td class="text-right">R$ ${formatarMoeda(vlUnit)}</td>
                <td class="text-right">R$ ${formatarMoeda(vlTotalR)}</td>
                <td class="text-right">R$ ${formatarMoeda(vlHomolog)}</td>
                <td class="text-center">${contratoId?`<button class="btn-action" title="Ver contrato" onclick="verDetalhesContrato('${contratoId.replace(/'/g,"\\'")}')"><span class="material-icons" style="font-size:15px">visibility</span></button>`:'-'}</td>
            </tr>`;
        }).join('');
        const badge = document.getElementById('totalItensBadge');
        if (badge) badge.textContent = `${total} itens`;
        // Paginação simples
        const pcEl = document.getElementById('paginacaoContainerItens');
        if (pcEl) {
            let html = `<div class="pagination-info">Mostrando ${inicio+1}–${fim} de ${total.toLocaleString('pt-BR')} itens</div><nav><ul class="pagination mb-0">`;
            html += `<li class="page-item ${page===1?'disabled':''}"><a class="page-link" href="#" onclick="paginacaoItens.page=${page-1};renderizarTabelaItens();return false;">«</a></li>`;
            let ini=Math.max(1,page-2), fim2=Math.min(totalPags,ini+4);
            for(let i=ini;i<=fim2;i++) html+=`<li class="page-item ${i===page?'active':''}"><a class="page-link" href="#" onclick="paginacaoItens.page=${i};renderizarTabelaItens();return false;">${i}</a></li>`;
            html += `<li class="page-item ${page===totalPags?'disabled':''}"><a class="page-link" href="#" onclick="paginacaoItens.page=${page+1};renderizarTabelaItens();return false;">»</a></li></ul></nav>`;
            pcEl.innerHTML = html;
        }
        setTimeout(iframeUpdateHeight, 100);
    }

    window.verDetalhesContrato = async function(contratoId) {
        const contrato = currentDisplayData.contratos.find(c => c.contrato === contratoId);
        if (!contrato) return;
        modalContratoAtual = contrato;

        const obras       = currentDisplayData.obras.filter(o => o.contrato === contratoId);
        const fiscais     = currentDisplayData.fiscais.filter(f => f.contrato === contratoId);
        const municipios  = currentDisplayData.municipios.filter(m => m.contrato === contratoId);
        const coordenadas = currentDisplayData.coordenadas.filter(c => c.contrato === contratoId);
        const trechos     = currentDisplayData.trechos.filter(t => t.contrato === contratoId);
        const situacoes   = [...currentDisplayData.situacao.filter(s => s.contrato === contratoId)].sort((a,b)=>(b.data||'').localeCompare(a.data||''));
        const primeiraCoord = coordenadas.find(c => c.latitude && c.longitude);
        const lat = primeiraCoord ? parseFloat(primeiraCoord.latitude.replace(',','.')).toFixed(6) : null;
        const lng = primeiraCoord ? parseFloat(primeiraCoord.longitude.replace(',','.')).toFixed(6) : null;

        const portalTransformado = transformarPortalCompras(contrato.portal_de_compras);
        const portalTexto = portalTransformado.texto || contrato.portal_de_compras || '-';
        const portalUrl   = portalTransformado.url;

        // ── LINKS: direto das colunas da tabela contratos_siad ──────
        const edital   = contrato.edital_link_siad   || '';
        const contLink = contrato.contrato_link_siad || '';

        // ── LICITAÇÃO: dados complementares (criterio, valores etc.) ─
        const numContrato = extrairNumeroContrato(contrato.contrato);
        const lic = await carregarLicitacoes();
        const dadosLic = numContrato ? lic[numContrato] : null;

        // Empresa / CNPJ do SIAD
        const empresaSiad    = contrato.razao_social_siad || contrato.empresa || '-';
        const cnpjSiad       = contrato.cnpj_siad || '-';
        const procGrupo      = contrato.proc_grupo || (dadosLic?.grupo||'');
        const procDet1       = contrato.proc_det1  || (dadosLic?.modalidade||'');
        const procEspec      = contrato.proc_espec || '';
        const numProcessoSiad = contrato.numero_processo_siad || (dadosLic?.numero_processo||'');

        // ── PAINEL (painel.csv) ──────────────────────────────────────
        const painelContrato = (currentDisplayData.painel || []).filter(p => p.contrato === contratoId);

        // ── SIAD (contratos_siad) ────────────────────────────────────
        const siadRows = contrato.siad_rows || [];
        const itensSiad = contrato.itens_siad || [];
        const painelColunas  = painelContrato.length > 0 ? Object.keys(painelContrato[0]) : [];
        const colMap = {
            'Empenho':        painelColunas.find(c => /empenho|nota_empenho|numero_empenho/i.test(c)),
            'Ano':            painelColunas.find(c => /^ano$/i.test(c) || /ano_empenho|ano_referencia/i.test(c)),
            'Unidade Gestora':painelColunas.find(c => /unidade_gestora|ug_|orgao/i.test(c)),
            'Valor Empenhado':painelColunas.find(c => /valor_empenh/i.test(c)),
            'Valor Liquidado':painelColunas.find(c => /liquidado|liquidac/i.test(c)),
            'Valor Pago':     painelColunas.find(c => /valor_pag|pago(?!r)/i.test(c)),
            'Data':           painelColunas.find(c => /^data/i.test(c) && !/cancelamento/i.test(c)),
            'Fonte':          painelColunas.find(c => /fonte|recurso/i.test(c)),

        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;" id="dicTabs">
            <button class="dic-tab-btn active" onclick="mostrarTabelaDic('todas',this)">Todas as Tabelas</button>
            ${tabelas.map(t=>`<button class="dic-tab-btn" onclick="mostrarTabelaDic('${t}',this)">${labelsTabela[t]||t}</button>`).join('')}
        </div>

        <div id="dicConteudo">
            ${tabelas.map(tabela => `
            <div class="metadata-container dic-section" data-tabela="${tabela}">
                <div class="metadata-header">
                    <span class="material-icons" style="font-size:16px;vertical-align:middle;">table_chart</span>

                            <th>Tabela</th>

    window.mostrarTabelaDic = function(qual, btnEl) {
        document.querySelectorAll('.dic-tab-btn').forEach(b => b.classList.remove('active'));
        if (btnEl) btnEl.classList.add('active');
        document.querySelectorAll('.dic-section').forEach(s => {
            s.style.display = (qual === 'todas' || s.dataset.tabela === qual) ? 'block' : 'none';
        });
        const busca = document.getElementById('dicBusca');
        if (busca) busca.value = '';

    window.buscarDicionario = function(termo) {
        const t = (termo||'').toLowerCase().trim();
        document.querySelectorAll('.dic-section').forEach(s => s.style.display = 'block');
        document.querySelectorAll('.dic-tab-btn').forEach(b => b.classList.remove('active'));
        const btnTodas = document.querySelector('.dic-tab-btn');
        if (btnTodas) btnTodas.classList.add('active');
        if (!t) {
            document.querySelectorAll('.dic-linha').forEach(r => { r.style.display = ''; r.classList.remove('dic-row-highlight'); });
            return;
        }
        document.querySelectorAll('.dic-linha').forEach(row => {
            const texto = row.textContent.toLowerCase();
            const match = texto.includes(t);
            row.style.display = match ? '' : 'none';
            if (match) row.classList.add('dic-row-highlight'); else row.classList.remove('dic-row-highlight');
        });
        document.querySelectorAll('.dic-section').forEach(s => {
            const visiveis = s.querySelectorAll('.dic-linha:not([style*="display: none"])').length;
            s.style.display = visiveis > 0 ? 'block' : 'none';
        });
    };

    window.copiarLinkModal = function() {
        if (!modalContratoAtual) return;
        const url = `${window.location.href.split('?')[0]}?contrato=${encodeURIComponent(modalContratoAtual.contrato||'')}`;
        navigator.clipboard.writeText(url)
            .then(() => {
                const toast = document.getElementById('toastSucesso');
                toast.style.display = 'flex';
                toast.style.animation = 'fadeInUp 0.3s ease';
                setTimeout(() => { toast.style.display = 'none'; }, 3000);
            })
            .catch(() => {
                // fallback para ambientes sem clipboard API
                const ta = document.createElement('textarea');
                ta.value = url; ta.style.position='fixed'; ta.style.opacity='0';
                document.body.appendChild(ta); ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                const toast = document.getElementById('toastSucesso');
                toast.style.display = 'flex';
                setTimeout(() => { toast.style.display = 'none'; }, 3000);
            });
    };

    // Iframe resize observer
    (function() {
        function sendH() {
            const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 10;
            try { if (window.parent && window.parent !== window) window.parent.postMessage({ iframeHeight: h, iframeResize: true, type: 'resize' }, '*'); } catch(e) {}
        }
        if (window.ResizeObserver) new ResizeObserver(sendH).observe(document.body);
        else { window.addEventListener('resize', sendH); setInterval(sendH, 2000); }
        sendH();
    })();
